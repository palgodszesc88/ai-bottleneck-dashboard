name: Daily Price Update

on:
  schedule:
    - cron: '0 23 * * 0-4'
    - cron: '5 8 * * 1-5'
    - cron: '32 13 * * 1-5'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch prices and momentum
        run: |
          cd scripts
          python update_prices.py --fast
          mkdir -p ../data
          mv -f prices_latest.json ../data/ 2>/dev/null || true
          mv -f momentum_latest.json ../data/ 2>/dev/null || true
          mv -f macro_alarms_latest.json ../data/ 2>/dev/null || true
          mv -f prices_*.csv ../data/ 2>/dev/null || true
          mv -f momentum_companies.js ../data/ 2>/dev/null || true
          ls -la ../data/

      - name: Patch dashboard
        run: python scripts/patch_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "price update $(date +%Y-%m-%d) $(date +%H:%M)UTC"
            git push
          fi
